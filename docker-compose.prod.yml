services:
  redis:
    image: redis:7-alpine
    container_name: wahda_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waadapp_tba_network

  app:
    image: wahda_web:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wahda_app
    restart: always
    env_file:
      - .env.production
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${APP_HOST_PORT:-3101}:3000"
    networks:
      - waadapp_tba_network

volumes:
  redis_data:

networks:
  waadapp_tba_network:
    external: true
